<!-- @dsCard group="Components" name="Status & Git Indicators" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Archer · Status &amp; Git Indicators</title>
<style>
  :root { color-scheme: dark; }
  body { margin:0; padding:40px; background:#282C34; color:#EFEFF1; font-family:"Onest",-apple-system,system-ui,sans-serif; -webkit-font-smoothing:antialiased; }
  h1 { font-size:13px; font-weight:400; letter-spacing:.12em; text-transform:uppercase; color:#9E9EA0; margin:0 0 28px; }
  .group { margin-bottom:28px; }
  .gt { font-family:"JetBrains Mono",ui-monospace,monospace; font-size:10px; color:#9E9EA0; margin-bottom:14px; letter-spacing:.05em; }
  .item { display:flex; align-items:center; gap:10px; padding:8px 0; }
  .dot { width:9px; height:9px; border-radius:50%; }
  .lbl { font-family:"Onest",sans-serif; font-size:13px; }
  .mono { font-family:"JetBrains Mono",ui-monospace,monospace; font-size:11.5px; font-weight:500; }
</style>
</head>
<body>
  <h1>Status &amp; Git Indicators</h1>

  <div class="group">
    <div class="gt">Agent activity</div>
    <div class="item"><span class="dot" style="background:#69B0D6"></span><span class="lbl">running</span><span class="mono" style="color:#69B0D6;margin-left:auto">#69B0D6</span></div>
    <div class="item"><span class="dot" style="background:#E8B068"></span><span class="lbl">attention · needs you</span><span class="mono" style="color:#E8B068;margin-left:auto">#E8B068</span></div>
    <div class="item"><span class="dot" style="background:#E86666"></span><span class="lbl">failure · command failed</span><span class="mono" style="color:#E86666;margin-left:auto">#E86666</span></div>
  </div>

  <div class="group">
    <div class="gt">Git diff</div>
    <div class="item"><span class="mono" style="color:#73C780;width:18px">+</span><span class="lbl">insertion</span><span class="mono" style="color:#73C780;margin-left:auto">#73C780</span></div>
    <div class="item"><span class="mono" style="color:#E86666;width:18px">−</span><span class="lbl">deletion</span><span class="mono" style="color:#E86666;margin-left:auto">#E86666</span></div>
  </div>
</body>
</html>
