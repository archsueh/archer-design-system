<!-- @dsCard group="Foundations" name="Shape, Border & Glass" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Archer · Shape, Border &amp; Glass</title>
<style>
  :root { color-scheme: dark; }
  body { margin:0; padding:40px; min-height:100vh; box-sizing:border-box;
    background:
      radial-gradient(circle at 20% 20%, #3a4150, transparent 60%),
      radial-gradient(circle at 80% 70%, #2d3340, transparent 55%),
      #21242b;
    color:#EFEFF1; font-family:"Onest",-apple-system,system-ui,sans-serif; -webkit-font-smoothing:antialiased; }
  h1 { font-size:13px; font-weight:400; letter-spacing:.12em; text-transform:uppercase; color:#9E9EA0; margin:0 0 28px; }
  .cards { display:flex; gap:24px; flex-wrap:wrap; }
  .card { width:220px; padding:20px; }
  .tag { font-family:"JetBrains Mono",ui-monospace,monospace; font-size:10px; color:#9E9EA0; margin-bottom:14px; }
  .hairline { border:1px solid rgba(255,255,255,.07); }
  .sharp { border-radius:0; }
  .glass { background:rgba(40,44,52,.72); -webkit-backdrop-filter:blur(20px); backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,.07); }
  .demo { height:64px; display:flex; align-items:center; justify-content:center; font-family:"JetBrains Mono",ui-monospace,monospace; font-size:11.5px; }
  .bad { color:#E86666; }
</style>
</head>
<body>
  <h1>Shape · Border · Glass</h1>
  <div class="cards">
    <div class="card">
      <div class="tag">rounded.brutalist · 0px</div>
      <div class="demo hairline sharp">sharp rect</div>
    </div>
    <div class="card">
      <div class="tag">bracketBorder() · 1pt hairline</div>
      <div class="demo hairline sharp" style="border-color:rgba(255,255,255,.18)">[ container ]</div>
    </div>
    <div class="card">
      <div class="tag">glassOpacity · 0.72 + blur 20</div>
      <div class="demo glass sharp">NSVisualEffectView</div>
    </div>
    <div class="card">
      <div class="tag bad">don't · rounded + shadow</div>
      <div class="demo" style="border-radius:14px;background:#2d3340;box-shadow:0 8px 24px rgba(0,0,0,.5)">suppressed</div>
    </div>
  </div>
</body>
</html>
