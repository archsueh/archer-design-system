<!-- @dsCard group="Screens" name="Usage Dashboard" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Archer · Usage Dashboard</title>
<style>
  :root { color-scheme: dark; }
  body { margin:0; padding:32px; background:#21242b;
    font-family:"Onest",-apple-system,system-ui,sans-serif; -webkit-font-smoothing:antialiased; }
  .win { max-width:760px; margin:0 auto; background:rgba(40,44,52,0.72);
    border:1px solid rgba(255,255,255,0.07); }
  .agents { display:flex; gap:8px; padding:12px 14px; border-bottom:1px solid rgba(255,255,255,0.07); }
  .chip { font-family:"JetBrains Mono",monospace; font-size:11.5px; font-weight:500; color:#9E9EA0;
    border:1px solid rgba(255,255,255,0.07); padding:5px 10px; }
  .chip.sel { color:#EFEFF1; font-weight:700; background:rgba(255,255,255,0.15); }
  .topbar { display:flex; align-items:center; gap:12px; padding:10px 14px;
    border-bottom:1px solid rgba(255,255,255,0.07); }
  .bracket { font-family:"JetBrains Mono",monospace; font-size:11.5px; font-weight:500; color:#EFEFF1;
    border:1px solid rgba(255,255,255,0.07); padding:5px 10px; }
  .tb-title { font-family:"JetBrains Mono",monospace; font-size:12px; font-weight:700; color:#EFEFF1; }
  .tb-sub { font-family:"JetBrains Mono",monospace; font-size:12px; color:#9E9EA0; }
  .body { padding:24px; }
  .h1 { font-size:24px; font-weight:600; color:#EFEFF1; margin:0; }
  .h1-sub { font-family:"JetBrains Mono",monospace; font-size:11px; color:#9E9EA0; margin:6px 0 22px; }
  .stats { display:flex; border:1px solid rgba(255,255,255,0.07); }
  .stat { flex:1; padding:16px; border-right:1px solid rgba(255,255,255,0.07); }
  .stat:last-child { border-right:none; }
  .num { font-size:38px; font-weight:600; color:#EFEFF1; line-height:1; }
  .num .u { font-size:17px; font-weight:500; color:#9E9EA0; }
  .lbl { font-size:13px; color:#EFEFF1; margin-top:8px; }
  .cap { font-family:"JetBrains Mono",monospace; font-size:10.5px; color:#9E9EA0; margin-top:2px; }
  .bar { height:4px; background:rgba(255,255,255,0.07); margin-top:12px; }
  .bar > i { display:block; height:4px; background:#69B0D6; }
  .bar.warn > i { background:#E8B068; }
</style>
</head>
<body>
  <div class="win">
    <div class="agents">
      <span class="chip sel">[ Claude ]</span>
      <span class="chip">[ Hermes ]</span>
      <span class="chip">[ Codex ]</span>
    </div>
    <div class="topbar">
      <span class="bracket">[ Archer ]</span>
      <span class="tb-title">Agent 用量</span>
      <span class="tb-sub">· 配额 / token / 窗口重置</span>
    </div>
    <div class="body">
      <h1 class="h1">Agent 用量</h1>
      <div class="h1-sub">Claude Code 官方 5h 窗口 + 周配额（与 /usage 同源） · Hermes 统计（与 state.db 同源）</div>
      <div class="stats">
        <div class="stat">
          <div class="num">47<span class="u">%</span></div>
          <div class="lbl">Claude · 5h 窗口</div>
          <div class="cap">重置 1h 12m</div>
          <div class="bar"><i style="width:47%"></i></div>
        </div>
        <div class="stat">
          <div class="num">82<span class="u">%</span></div>
          <div class="lbl">周配额</div>
          <div class="cap">重置 4d 6h</div>
          <div class="bar warn"><i style="width:82%"></i></div>
        </div>
        <div class="stat">
          <div class="num">1.9<span class="u">M</span></div>
          <div class="lbl">本窗口 token</div>
          <div class="cap">in 1.4M · out 0.5M</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
